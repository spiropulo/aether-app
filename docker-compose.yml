services:
  # GCS emulator for local PDF uploads (implements GCS JSON API; Java client compatible)
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: fake-gcs-server
    ports:
      - "9195:8000"
    command: ["-scheme", "http", "-port", "8000"]
    volumes:
      - fake-gcs-data:/data

  # Pub/Sub emulator for estimate event processing
  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: pubsub-emulator
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--project=aether", "--host-port=0.0.0.0:8085"]
    ports:
      - "8085:8085"

  # Local SMTP server for development — captures all emails and provides web UI at http://localhost:8025
  # Use with spring.mail.host=localhost, spring.mail.port=1025
  # In production, configure SendGrid (smtp.sendgrid.net:587), Mailgun (smtp.mailgun.org:587), or similar.
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  # Twilio-compatible SMS API mock (Stoplight Prism). Set TWILIO_API_BASE_URL=http://localhost:4010 (see README).
  twilio-mock:
    image: stoplight/prism:5
    container_name: twilio-mock
    # Prism v5: no --validate-request; use --errors only if you want violations as HTTP errors (default false).
    command:
      - mock
      - --host
      - "0.0.0.0"
      - /spec/twilio-messages-mock.yaml
    volumes:
      - ./docker/twilio-messages-mock.yaml:/spec/twilio-messages-mock.yaml:ro
    ports:
      - "4010:4010"

volumes:
  fake-gcs-data:

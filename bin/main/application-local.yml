# Local development profile — uses emulators for Firestore, Pub/Sub, and GCS.
# Set spring.profiles.active=local (or rely on default) when running locally.
spring:
  config:
    activate:
      on-profile: local

  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.storage.GcpStorageAutoConfiguration

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:aether}
      credentials:
        location: ${GCP_CREDENTIALS_LOCATION:}
      firestore:
        enabled: true
        project-id: ${GCP_PROJECT_ID:aether}
        emulator:
          enabled: true
        host-port: ${FIRESTORE_EMULATOR_HOST:localhost:8075}
      pubsub:
        enabled: true
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}
      storage:
        enabled: true

aether:
  storage:
    # fake-gcs-server (see docker-compose: docker compose up -d fake-gcs)
    emulator-host: ${STORAGE_EMULATOR_HOST:http://localhost:9195}
    bucket-name: ${GCS_BUCKET_NAME:aether-estimates}
  agent:
    # Schema Mapper Agent (Aether AI). Default for local: agent runs on port 8055.
    process-url: ${AETHER_AGENT_PROCESS_URL:http://localhost:8055/api/v1/schema-mapper/process}
    # Tenant-Adaptive Agent for project pricing.
    tenant-adaptive-url: ${AETHER_AGENT_TENANT_ADAPTIVE_URL:http://localhost:8055/api/v1/tenant-adaptive/process}
  pubsub:
    tenant-topic: ${AETHER_PUBSUB_TENANT_TOPIC:tenant-events}
    # Topic for PDF processing events (AI agent). Create in Pub/Sub emulator.
    estimate-topic: ${AETHER_PUBSUB_ESTIMATE_TOPIC:estimate-events}
    # Subscription to pull events and forward PDFs to the agent.
    estimate-subscription: ${AETHER_PUBSUB_ESTIMATE_SUBSCRIPTION:estimate-events-sub}


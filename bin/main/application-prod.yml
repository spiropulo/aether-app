# Production profile — uses real GCP services. All config via environment variables.
# Set spring.profiles.active=prod when deploying (e.g. Cloud Run).
spring:
  config:
    activate:
      on-profile: prod

  graphql:
    schema:
      printer:
        enabled: ${GRAPHQL_SCHEMA_PRINTER_ENABLED:false}

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID}
      credentials:
        location: ${GCP_CREDENTIALS_LOCATION:}
      firestore:
        enabled: true
        project-id: ${GCP_PROJECT_ID}
      pubsub:
        enabled: true
      storage:
        enabled: true

aether:
  agent:
    process-url: ${AETHER_AGENT_PROCESS_URL:}
  pubsub:
    tenant-topic: ${AETHER_PUBSUB_TENANT_TOPIC:}
    estimate-topic: ${AETHER_PUBSUB_ESTIMATE_TOPIC:}
    estimate-subscription: ${AETHER_PUBSUB_ESTIMATE_SUBSCRIPTION:}
  storage:
    bucket-name: ${GCS_BUCKET_NAME}
    estimate-folder: ${GCS_ESTIMATE_FOLDER:estimates}


spring:
  application:
    name: aether
  profiles:
    default: local
  graphql:
    schema:
      printer:
        enabled: ${GRAPHQL_SCHEMA_PRINTER_ENABLED:true}
  codec:
    # Allow up to 20 MB in-memory for multipart file uploads
    max-in-memory-size: 20MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true

aether:
  training-data:
    # Directory containing .txt training files (relative to working dir). Seeded into Firestore on startup.
    path: ${AETHER_TRAINING_DATA_PATH:training-data}
  agent:
    # Schema Mapper Agent base URL for PDF processing. When set, Pub/Sub listener forwards PDFs here.
    process-url: ${AETHER_AGENT_PROCESS_URL:}
  pubsub:
    # Optional: emit tenant lifecycle events (TENANT_CREATED/UPDATED/DELETED)
    tenant-topic: ${AETHER_PUBSUB_TENANT_TOPIC:}
    # Pub/Sub topic for triggering AI processing of uploaded PDFs
    estimate-topic: ${AETHER_PUBSUB_ESTIMATE_TOPIC:}
    # Subscription to pull estimate events and forward PDFs to the agent. Requires estimate-topic.
    estimate-subscription: ${AETHER_PUBSUB_ESTIMATE_SUBSCRIPTION:}
  jwt:
    # Must be overridden in production via JWT_SECRET env var (min 32 characters / 256 bits for HS256)
    secret: ${JWT_SECRET:aether-local-dev-secret-key-replace-in-production-min-32ch}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  storage:
    # GCS bucket where uploaded PDFs are stored
    bucket-name: ${GCS_BUCKET_NAME:aether-estimates}
    # Folder prefix inside the bucket
    estimate-folder: ${GCS_ESTIMATE_FOLDER:estimates}

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.4'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.aather'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-graphql'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Spring Cloud GCP Firestore and Pub/Sub
    implementation platform('com.google.cloud:spring-cloud-gcp-dependencies:5.12.1')
    implementation 'com.google.cloud:spring-cloud-gcp-starter-firestore'
    implementation 'com.google.cloud:spring-cloud-gcp-data-firestore'
    implementation 'com.google.cloud:spring-cloud-gcp-starter-pubsub'

    implementation 'org.springframework.boot:spring-boot-starter-validation'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

